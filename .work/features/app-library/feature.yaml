name: app-library
version: 1.0.0
description: Application library with OAuth 2.0 SSO integration
status: active
owner: Engineering Team
created: 2025-11-16

# Service implementations
services:
  front-public:
    routes:
      - path: /app/features/app-library
        file: app/routes/app.features.app-library._index.tsx
        description: Re-exports the feature route module for the library home
        authentication_required: true
        methods: [GET]

      - path: /app/features/app-library/oauth-error
        file: app/routes/app.features.app-library.oauth-error.tsx
        description: OAuth error handler entry
        authentication_required: false
        methods: [GET]

    feature_modules:
      - app/features/app-library/routes/index.tsx
      - app/features/app-library/routes/oauth-error.tsx

    components:
      - app/features/app-library/ui/AppCard.tsx
      - app/features/app-library/ui/AppGrid.tsx
      - app/features/app-library/ui/EmptyState.tsx
      - app/features/app-library/ui/LoadingState.tsx
      - app/features/app-library/ui/ErrorState.tsx

    utilities:
      - app/features/app-library/utils/oauth.ts
      - app/features/app-library/utils/api.ts

  front-admin:
    routes:
      - path: /admin/features/app-library
        file: app/routes/admin.features.app-library._index.tsx
        description: Admin app registry list (uses AppTable)
        methods: [GET]

      - path: /admin/features/app-library/new
        file: app/routes/admin.features.app-library.new.tsx
        description: Create integrated application (AppForm)
        methods: [GET, POST]

      - path: /admin/features/app-library/{appId}
        file: app/routes/admin.features.app-library.$appId.tsx
        description: Edit app, secrets, access, usage, audit (calls `/api/admin/app-library/*`)
        methods: [GET, POST]

    components:
      - app/features/app-library/ui/AppTable.tsx
      - app/features/app-library/ui/AppForm.tsx

  back-api:
    notes:
      - Service code registers two routers with `/api/...` prefixes (see module). Server-to-server callers (e.g. Remix loaders hitting `http://back-api:8000`) use those full paths; browser-facing URL layout depends on the edge proxy in each environment.
    routers:
      - prefix: /api/app-library (public_router)
        examples:
          - GET /api/app-library/oauth-clients — list apps for the signed-in user session
          - GET /api/app-library/oauth-clients/{client_id}
          - POST /api/app-library/user/app-preferences/{app_client_id}/toggle-favorite
      - prefix: /api/admin (admin_router)
        examples:
          - GET/POST /api/admin/app-library — admin registry CRUD surface
          - Additional maintenance routes for status, secrets, access, usage, audit (see `back-api/features/app-library/api.py`).
    implementation:
      - back-api/features/app-library/api.py
      - back-api/features/app-library/domain.py
      - back-api/features/app-library/infrastructure.py

  back-auth:
    notes:
      - OAuth protocol endpoints for launching apps are implemented by the **auto-auth** stack (`front-public` routes + `back-auth` `/internal/oauth/*`), not a separate `features/app-library` package on `back-auth`.

  shared:
    contracts:
      - contracts/app_library/feature.yaml

    types:
      - types/app-library.ts

# Database schema
database:
  postgres:
    tables:
      - name: apps
        description: Registered integrated applications
        schema: |
          app_id (PK)
          name
          description
          logo_url
          website_url
          client_id
          category
          is_enabled
          created_at
          updated_at

      - name: app_access_rules
        description: Access control rules per app
        schema: |
          rule_id (PK)
          app_id (FK)
          subscription_tier (free, pro, enterprise)
          is_allowed
          created_at

      - name: user_app_preferences
        description: User authorization preferences per app
        schema: |
          preference_id (PK)
          user_id (FK)
          app_id (FK)
          oauth_grant_id
          authorized_at
          last_accessed_at
          is_revoked
          revoked_at

      - name: app_audit_log
        description: Application access audit trail
        schema: |
          log_id (PK)
          app_id (FK)
          user_id (FK)
          action (authorized, launched, revoked)
          timestamp
          ip_address

  cassandra:
    tables:
      - name: auth_events.oauth_auth_events
        description: OAuth authorization events
        schema: |
          timestamp (clustering key)
          user_id
          app_id
          event_type (app_viewed, authorization_started, authorization_granted, app_launched)
          ip_address
          user_agent
          status (success, failure)

      - name: auth_events.app_launch_events
        description: Application launch events
        schema: |
          timestamp (clustering key)
          user_id
          app_id
          session_id
          ip_address
          user_agent

# External integrations
external_integrations:
  - name: E-Cards
    url_dev: http://localhost:7300
    url_prod: https://ecards.epicstudio.com
    client_id: ecards_a1b2c3d4
    description: E-Card + QR-Code Batch Generator
    scopes: [profile, email, batch-management]
    oauth_flow: authorization_code

# Security configuration
security:
  oauth:
    flow: authorization_code
    pkce: required
    code_challenge_method: S256
    csrf_protection: state_parameter
    token_storage: session_storage

  authentication:
    required: true
    session_based: true
    cookie_credentials: include

# UI Configuration
ui:
  components:
    - AppCard (display single app with launch button)
    - AppGrid (grid layout for apps)
    - EmptyState (when no apps available)
    - LoadingState (loading apps)
    - ErrorState (error handling)

  styling:
    framework: tailwind
    theme: responsive
    accessibility: wcag_2.1_aa

# Performance targets
performance:
  target_load_time_ms: 2000
  target_oauth_redirect_ms: 500
  cache_strategy: session_storage

# Monitoring and analytics
monitoring:
  track_events:
    - app_library_view
    - app_launch_initiated
    - oauth_flow_started
    - oauth_flow_completed
    - oauth_flow_failed

  error_tracking:
    - oauth_launch_error
    - api_fetch_error
    - token_generation_error

# Testing
testing:
  unit_tests:
    - utils/oauth.test.ts
    - utils/api.test.ts

  integration_tests:
    - routes/index.test.tsx
    - routes/oauth-error.test.tsx

  e2e_tests:
    - app-library-full-flow.spec.ts

# Links to documentation
links:
  planning_docs:
    - .work/features/app-library/README.md
    - .work/features/app-library/USER_STORIES.md
    - .work/features/app-library/TECHNICAL_SPEC.md

  guides:
    - .work/features/app-library/QUICK_START.md
    - .work/features/app-library/OAUTH_IMPLEMENTATION_GUIDE.md
    - .work/features/app-library/DATABASE_SCHEMA.md
    - .work/features/app-library/IMPLEMENTATION_PLAN.md

  implementation_docs:
    - front-public/app/features/app-library/feature.yaml
    - back-api/features/app-library/feature.yaml

# Deployment
deployment:
  environment_variables: []

  required_services:
    - back-api
    - back-auth
    - back-postgres
    - back-cassandra

  deployment_checklist:
    - Database schema deployed
    - Seed data loaded (E-Cards app)
    - Back-API endpoints available
    - OAuth server configured
    - Frontend build successful
    - Integration tests passing

# Rollback plan
rollback:
  strategy: feature_flag
  steps:
    - Set feature_flags.enabled to false
    - Revert authentication redirect to progressive-profiling
    - Monitor for residual OAuth flows

# Support
support:
  contact: support@tools-dashboard.io
  documentation_url: /docs/app-library
  troubleshooting_guide: .work/features/app-library/README.md#FAQ

# Changelog
changelog:
  - version: 1.0.0
    date: 2025-11-16
    changes:
      - Initial implementation
      - OAuth 2.0 with PKCE support
      - Responsive UI with Tailwind CSS
      - E-Cards integration

