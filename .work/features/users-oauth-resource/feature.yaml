name: users-oauth-resource
version: 1.0.0
description: OAuth Bearer resource — current user profile (/users/me) on back-api
status: active
owner: Engineering Team

services:
  back-api:
    router_prefix: /users
    endpoints:
      - path: /users/me
        method: GET
        description: Returns user profile + optional subscription summary for a valid OAuth access token (Bearer)
        auth_type: Bearer (OAuth access token)
        auth_required: true

    implementation:
      - back-api/features/users/api.py
      - back-api/features/users/__init__.py

    dependencies_internal:
      - back-auth (POST /internal/oauth/validate-token via HTTP)
      - postgresql (users, subscriptions tables as implemented in handler)

notes:
  - Browser-facing path is commonly `/api/users/me` when the edge proxy mounts `back-api` under `/api/` (nginx strips the `/api` prefix when forwarding—confirm for your environment).
  - Distinct from `back-api/features/auto-auth` routes such as `/api/users/{user_id}` (API key / product integration surface).

links:
  planning_docs:
    - .work/features/users-oauth-resource/README.md

  related_features:
    - .work/features/auto-auth/feature.yaml

