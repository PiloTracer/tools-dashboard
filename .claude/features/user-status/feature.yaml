name: user-status
version: 1.0.1
description: Public auth/session UX (menu, guards) and user-status API on back-api
status: active
owner: Engineering Team

services:
  front-public:
    routes:
      - path: /app/features/user-status
        file: app/routes/app.features.user-status._index.tsx
        description: User status / session shell entry (re-exports feature route)
        methods: [GET]

    feature_modules:
      - app/features/user-status/routes/index.tsx

    components:
      - app/features/user-status/ui/UserMenu.tsx
      - app/features/user-status/ui/StatusIndicator.tsx
      - app/features/user-status/ui/ProtectedRoute.tsx

    hooks:
      - app/features/user-status/hooks/useUserStatus.ts
      - app/features/user-status/hooks/useProtectedRoute.ts

    store:
      - app/features/user-status/store/userStatusStore.ts
      - app/features/user-status/store/types.ts
      - app/features/user-status/store/constants.ts

  front-admin:
    routes:
      - path: /admin/api/users/{userId}/status
        file: app/routes/admin.api.users.$userId.status.tsx
        description: Proxy PATCH to back-api for admin-driven status changes
        methods: [PATCH]

  back-api:
    router_prefix: /user-status
    endpoints:
      - path: /user-status/
        method: GET
        description: Aggregate authentication / navigation snapshot (placeholder auth dependency today)
      - path: /user-status/navigation
        method: POST
        description: Update navigation intent for post-login redirects
      - path: /user-status/navigation
        method: DELETE
        description: Clear stored navigation state
      - path: /user-status/health
        method: GET
        description: Router health probe

    implementation:
      - back-api/features/user-status/api.py
      - back-api/features/user-status/domain.py
      - back-api/features/user-status/infrastructure.py

  shared:
    contracts:
      - shared/contracts/user-status/feature.yaml

links:
  planning_docs:
    - .claude/features/user-status/README.md

  implementation_docs:
    - front-public/app/features/user-status/feature.yaml
    - back-api/features/user-status/feature.yaml

---

Metadata:
- Last Updated: April 22, 2026
- Maintainer: Engineering Team
- Status: Active
