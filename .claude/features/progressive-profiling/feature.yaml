name: progressive-profiling
version: 1.0.1
description: Onboarding profile collection (scaffolded UI + minimal back-api router)
status: active
owner: Engineering Team

services:
  front-public:
    routes:
      - path: /app/features/progressive-profiling
        file: app/routes/app.features.progressive-profiling._index.tsx
        description: Progressive profiling entry (re-exports feature route module)
        methods: [GET, POST]

      - path: /app/features/progressive-profiling/complete
        file: app/routes/app.features.progressive-profiling.complete.tsx
        description: Completion step route
        methods: [GET, POST]

    feature_modules:
      - app/features/progressive-profiling/routes/index.tsx
      - app/features/progressive-profiling/routes/complete.tsx

    components:
      - app/features/progressive-profiling/ui/ProfileForm.tsx
      - app/features/progressive-profiling/ui/ProgressStepper.tsx

  back-api:
    router_prefix: /progressive-profiling
    endpoints:
      - path: /progressive-profiling/profile
        method: GET
        description: Mock profile payload for development scaffolding
        auth_required: true

    implementation:
      - back-api/features/progressive-profiling/api.py
      - back-api/features/progressive-profiling/domain.py
      - back-api/features/progressive-profiling/infrastructure.py

  shared:
    contracts:
      - shared/contracts/progressive-profiling/feature.yaml

links:
  planning_docs:
    - .claude/features/progressive-profiling/README.md

  implementation_docs:
    - back-api/features/progressive-profiling/feature.yaml
    - front-public/app/features/progressive-profiling/feature.yaml

notes:
  - Older docs referenced non-existent controllers and `/api/users/profile`; the live router uses `/progressive-profiling/*` per `back-api/features/progressive-profiling/api.py`.

---

Metadata:
- Last Updated: April 22, 2026
- Maintainer: Engineering Team
- Status: Active
