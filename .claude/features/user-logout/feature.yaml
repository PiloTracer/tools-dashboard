name: user-logout
version: 1.0.1
description: End-user logout via Remix resource route; proxies to back-auth session teardown
status: active
owner: Engineering Team

services:
  front-public:
    routes:
      - path: /app/features/user-logout
        file: app/routes/app.features.user-logout._index.tsx
        description: Logout resource route (loader/action); redirects to app home with cleared session cookie from back-auth
        authentication_required: false
        methods: [GET, POST]

    feature_module:
      - app/features/user-logout/routes/index.tsx

    components:
      - app/features/user-logout/ui/LogoutMessage.tsx

  back-auth:
    endpoints:
      - path: /user-registration/logout
        method: POST
        description: Invalidate session cookie and record session_terminated when applicable (implemented on user-registration router)
        auth_required: false

    implementation:
      - back-auth/features/user-registration/api.py

links:
  planning_docs:
    - .claude/features/user-logout/README.md

  implementation_docs:
    - front-public/app/features/user-logout/feature.yaml

---

Metadata:
- Last Updated: April 22, 2026
- Maintainer: Engineering Team
- Status: Active
