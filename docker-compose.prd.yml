# Production-oriented stack: baked images, no bind-mounts, no MailHog.
# Target hostname: tools.aiepic.app (see .env.prd.example + infra/nginx/default.prd.conf).
#
#   cp .env.prd.example .env.prd   # then set JWT_SECRET_KEY, POSTGRES_PASSWORD, etc.
#   docker compose -f docker-compose.prd.yml --env-file .env.prd up -d --build
#
# TLS: terminate at CDN/LB in front of this nginx, or extend nginx with certs (see infra/nginx/README.prd.md).

x-logging: &json-file-logging
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

services:
  nginx-proxy:
    image: nginx:alpine
    <<: *json-file-logging
    ports:
      - "${NGINX_HTTP_PORT:-8082}:80"
    volumes:
      - ./infra/nginx/default.prd.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      front-admin:
        condition: service_healthy
      front-public:
        condition: service_healthy
      back-api:
        condition: service_healthy
      back-auth:
        condition: service_healthy
      back-websockets:
        condition: service_healthy
      feature-registry:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m

  front-admin:
    <<: *json-file-logging
    build:
      context: ./front-admin
      dockerfile: Dockerfile.prd
    environment:
      - NODE_ENV=production
      - BACKEND_API_URL=${FRONT_INTERNAL_BACK_API_URL:-http://back-api:8000}
      - AUTH_API_URL=${FRONT_INTERNAL_BACK_AUTH_URL:-http://back-auth:8001}
      - WEBSOCKET_URL=${FRONT_INTERNAL_WEBSOCKET_URL:-ws://back-websockets:8010}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/admin/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 512m

  front-public:
    <<: *json-file-logging
    build:
      context: ./front-public
      dockerfile: Dockerfile.prd
    environment:
      - NODE_ENV=production
      - BACKEND_API_URL=${FRONT_INTERNAL_BACK_API_URL:-http://back-api:8000}
      - AUTH_API_URL=${FRONT_INTERNAL_BACK_AUTH_URL:-http://back-auth:8001}
      - WEBSOCKET_URL=${FRONT_INTERNAL_WEBSOCKET_URL:-ws://back-websockets:8010}
      # Server-side Remix → back-auth (Docker DNS). Do not use the public https URL here.
      - BACK_AUTH_BASE_URL=${BACK_AUTH_BASE_URL:-http://back-auth:8001}
      - PUBLIC_APP_BASE_PATH=${PUBLIC_APP_BASE_PATH:-/app}
      - OAUTH_CONSENT_SERVICE_SECRET=${OAUTH_CONSENT_SERVICE_SECRET:-}
      - OAUTH_REQUIRE_INTERACTIVE_CONSENT_UI=${OAUTH_REQUIRE_INTERACTIVE_CONSENT_UI:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/app/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 512m

  back-api:
    <<: *json-file-logging
    build:
      context: .
      dockerfile: back-api/Dockerfile.prd
    environment:
      - DATABASE_URL=${BACK_API_DATABASE_URL:-postgresql://user:pass@postgresql:5432/main_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SEAWEED_S3_ACCESS_KEY=${SEAWEED_S3_ACCESS_KEY:-seaweedadmin}
      - SEAWEED_S3_SECRET_KEY=${SEAWEED_S3_SECRET_KEY:-^seaweedadmin!changeme!}
      - CASSANDRA_CONTACT_POINTS=${CASSANDRA_CONTACT_POINTS:-cassandra}
      - FEATURE_REGISTRY_URL=${FEATURE_REGISTRY_URL:-http://feature-registry:8005}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://back-auth:8001}
      - OAUTH_CONSENT_SERVICE_SECRET=${OAUTH_CONSENT_SERVICE_SECRET:-}
      - PYTHONUNBUFFERED=1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 4
      start_period: 30s
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 768m

  back-auth:
    <<: *json-file-logging
    build:
      context: ./back-auth
      dockerfile: Dockerfile.prd
    environment:
      - DATABASE_URL=${BACK_AUTH_DATABASE_URL:-postgresql+asyncpg://user:pass@postgresql:5432/main_db}
      - REDIS_URL=${BACK_AUTH_REDIS_URL:-redis://redis:6379/1}
      - PUBLIC_APP_BASE_URL=${PUBLIC_APP_BASE_URL:-https://tools.aiepic.app/app}
      - VERIFICATION_PATH=${VERIFICATION_PATH:-/features/user-registration/verify}
      - REGISTRATION_PASSWORD_MIN_LENGTH=${REGISTRATION_PASSWORD_MIN_LENGTH:-12}
      - REGISTRATION_CSRF_COOKIE_SECURE=${REGISTRATION_CSRF_COOKIE_SECURE:-true}
      - REGISTRATION_CSRF_COOKIE_SAMESITE=${REGISTRATION_CSRF_COOKIE_SAMESITE:-Lax}
      - REGISTRATION_CSRF_COOKIE_MAX_AGE=${REGISTRATION_CSRF_COOKIE_MAX_AGE:-900}
      - REGISTRATION_CSRF_COOKIE_DOMAIN=${REGISTRATION_CSRF_COOKIE_DOMAIN:-}
      - SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME:-td_session}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - SESSION_COOKIE_SAMESITE=${SESSION_COOKIE_SAMESITE:-Lax}
      - SESSION_COOKIE_MAX_AGE=${SESSION_COOKIE_MAX_AGE:-604800}
      - SESSION_COOKIE_DOMAIN=${SESSION_COOKIE_DOMAIN:-}
      - REGISTRATION_TOKEN_TTL_MINUTES=${REGISTRATION_TOKEN_TTL_MINUTES:-15}
      - REFRESH_TOKEN_TTL_DAYS=${REFRESH_TOKEN_TTL_DAYS:-7}
      - MAIL_HOST=${MAIL_HOST:-localhost}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_SENDER=${MAIL_SENDER:-no-reply@localhost}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-true}
      - CASSANDRA_CONTACT_POINTS=${CASSANDRA_CONTACT_POINTS:-cassandra}
      - CASSANDRA_PORT=${CASSANDRA_PORT:-9042}
      - CASSANDRA_KEYSPACE=${CASSANDRA_KEYSPACE:-tools_dashboard}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-}
      - GOOGLE_OAUTH_SCOPES=${GOOGLE_OAUTH_SCOPES:-openid email profile}
      - GOOGLE_OAUTH_ALLOWED_DOMAINS=${GOOGLE_OAUTH_ALLOWED_DOMAINS:-}
      - GOOGLE_OAUTH_BUTTON_TEXT=${GOOGLE_OAUTH_BUTTON_TEXT:-}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@tools.aiepic.app}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:?Set DEFAULT_ADMIN_PASSWORD in .env.prd}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env.prd}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m

  back-websockets:
    <<: *json-file-logging
    build:
      context: ./back-websockets
      dockerfile: Dockerfile.prd
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - PYTHONUNBUFFERED=1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 4
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m

  back-workers:
    build:
      context: ./back-workers
      dockerfile: Dockerfile.prd
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - API_BASE_URL=${API_BASE_URL:-http://back-api:8000}
    depends_on:
      redis:
        condition: service_healthy
      back-api:
        condition: service_started
    restart: unless-stopped
    mem_limit: 512m

  back-postgres-service:
    build:
      context: ./back-postgres
      dockerfile: Dockerfile.prd
    environment:
      - DATABASE_URL=${BACK_POSTGRES_SERVICE_DATABASE_URL:-postgresql://user:pass@postgresql:5432/main_db}
    depends_on:
      postgresql:
        condition: service_healthy
      back-auth:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m

  back-cassandra:
    build:
      context: ./back-cassandra
      dockerfile: Dockerfile.prd
    environment:
      - CASSANDRA_CONTACT_POINTS=${CASSANDRA_CONTACT_POINTS:-cassandra}
    depends_on:
      cassandra:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m

  feature-registry:
    <<: *json-file-logging
    build:
      context: ./feature-registry
      dockerfile: Dockerfile.prd
    environment:
      - DATABASE_URL=${FEATURE_REGISTRY_DATABASE_URL:-postgresql://user:pass@postgresql:5432/main_db}
      - PYTHONUNBUFFERED=1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8005/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 4
      start_period: 20s
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >
      sh -c
      "if [ -n \"$${REDIS_PASSWORD}\" ];
      then exec redis-server /usr/local/etc/redis/redis.conf --requirepass \"$${REDIS_PASSWORD}\";
      else exec redis-server /usr/local/etc/redis/redis.conf; fi"
    volumes:
      - redis_data:/data
      - ./back-redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG; else redis-cli ping | grep -q PONG; fi",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 256m

  postgresql:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-main_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prd}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 1024m

  cassandra:
    image: cassandra:4
    environment:
      - CASSANDRA_CLUSTER_NAME=${CASSANDRA_CLUSTER_NAME:-tools_cluster}
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    restart: unless-stopped
    mem_limit: 2048m

  seaweedfs:
    image: chrislusf/seaweedfs
    volumes:
      - seaweed-data:/data
      - ./seaweedfs-config/s3-config.json:/etc/seaweedfs/s3-config.json:ro
      - ./seaweedfs-config/security.toml:/etc/seaweedfs/security.toml:ro
    environment:
      - WEED_MASTER_VOLUME_GROWTH_COPY_1=1
    command: >
      server -s3 -filer -dir=/data -volume.max=10
      -s3.config=/etc/seaweedfs/s3-config.json
      -master.volumeSizeLimitMB=1024
      -master.defaultReplication=000
      -s3.domainName=${SEAWEEDFS_S3_DOMAIN_NAME:-localhost}
    restart: unless-stopped
    mem_limit: 512m

volumes:
  postgres_data:
  redis_data:
  cassandra_data:
  seaweed-data:
