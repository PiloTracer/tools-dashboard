# Dev edge (in-container nginx) — browser official URL for the public Remix app:
#   https://dev.aiepic.app/app
# Hostname + TLS terminate on host nginx (see infra/nginx/host-setup/03-*.sh); preserve X-Forwarded-Proto.
# Published HTTP: host :8082 → this server :80 (see docker-compose.dev.yml).

# Map to determine which service should serve /build/ assets based on referer or URI
map $http_referer$request_uri $build_backend {
    default                                 "front-public:3000";
    "~*/admin/"                            "front-admin:3000";
    "~*admin"                              "front-admin:3000";
}

# TLS may terminate on host nginx (host-setup/03); preserve client scheme for apps / OAuth.
map $http_x_forwarded_proto $forwarded_proto {
    https https;
    http  http;
    default $scheme;
}

map $forwarded_proto $forwarded_port_hint {
    https 443;
    http  80;
    default $server_port;
}

map $http_x_forwarded_port $forwarded_port {
    ""      $forwarded_port_hint;
    default $http_x_forwarded_port;
}

server {
    listen 80;

    server_name dev.aiepic.app _;

    # Allow file uploads up to 10MB
    client_max_body_size 10M;

    # Preserve query string (Remix client loader uses ?_data=...); plain 301 /app/ drops it → "Failed to fetch".
    location = / {
        if ($args = '') { return 301 /app/; }
        return 301 /app/?$args;
    }

    location /admin/build/ {
        proxy_pass http://front-admin:3000/admin/build/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    # Handle source maps - route based on referer like other build assets
    location ~ ^/build/.*\.map$ {
        set $proxy_upstream $build_backend;
        proxy_pass http://$proxy_upstream;
        proxy_intercept_errors on;
        error_page 404 = @map_fallback;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    location @map_fallback {
        return 204;
    }

    # Route favicon.ico based on referer (admin vs app)
    location = /favicon.ico {
        set $proxy_upstream $build_backend;
        proxy_pass http://$proxy_upstream;
        proxy_intercept_errors on;
        error_page 404 = @favicon_fallback;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    location @favicon_fallback {
        return 204;
    }

    # Prefix location /admin/ does not match URI /admin (no slash); normalize for overview + <base href="/admin/">.
    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://front-admin:3000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    # /app/ is front-public only; admin UI is /admin/ (front-admin). Common typo → canonical URL.
    location = /app/admin {
        return 301 /admin/;
    }

    location ^~ /app/admin/ {
        rewrite ^/app/admin/(.*)$ /admin/$1 permanent;
    }

    location = /app {
        if ($args = '') { return 301 /app/; }
        return 301 /app/?$args;
    }

    location /app/locales/ {
        proxy_pass http://front-public:3000/locales/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    # App library card logos (Remix public/app-library-logos/ → /app/app-library-logos/ in browser)
    location /app/app-library-logos/ {
        proxy_pass http://front-public:3000/app-library-logos/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    # OAuth 2.0 endpoints (served by front-public)
    location /oauth/ {
        proxy_pass http://front-public:3000/oauth/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    location /.well-known/ {
        proxy_pass http://front-public:3000/.well-known/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
        # Cache JWKS and OpenID configuration
        proxy_cache_valid 200 1h;
    }

    location /app/ {
        proxy_pass http://front-public:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    location /build/ {
        # Route to front-admin if referer is from /admin/, otherwise front-public
        set $proxy_upstream $build_backend;
        rewrite ^/build/(.*)$ /build/$1 break;
        proxy_pass http://$proxy_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    # These back-api routers use a literal /api/... prefix. The generic /api/ block below strips /api/ and
    # would send wrong paths (e.g. /integrations/... instead of /api/integrations/...).
    location ^~ /api/integrations/ {
        proxy_pass http://back-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    location ^~ /api/app-library/ {
        proxy_pass http://back-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    location ^~ /api/admin/app-library {
        proxy_pass http://back-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    location /api/ {
        proxy_pass http://back-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    location /auth/ {
        proxy_pass http://back-auth:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    location /ws/ {
        proxy_pass http://back-websockets:8010/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    location /storage/ {
        # Proxy to SeaweedFS Filer (port 8888) for public file access
        # Filer serves files from /buckets/ directory
        proxy_pass http://seaweedfs:8888/buckets/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Port $forwarded_port;
    }

    location = /.well-known/appspecific/com.chrome.devtools.json {
        add_header Content-Type application/json;
        return 204;
    }
}
