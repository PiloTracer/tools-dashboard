# Example: install on the HOST nginx (the one already listening on :80), not inside Docker.
# Lets http://dev.aiepic.app/... work without :8082 in the browser by proxying to this stack’s nginx on 8082.
#
# Typical install (Debian/Ubuntu):
#   sudo cp infra/nginx/system-port80-to-docker-8082.example.conf /etc/nginx/sites-available/dev.aiepic.app
#   sudo ln -sf /etc/nginx/sites-available/dev.aiepic.app /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS: dev.aiepic.app A/AAAA record must point at this machine.

server {
    listen 80;
    listen [::]:80;
    server_name dev.aiepic.app;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

# For WebSocket (/ws/) through this hop, add in http {} (e.g. nginx.conf):
#   map $http_upgrade $connection_upgrade { default upgrade; '' close; }
# then set: proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade;
