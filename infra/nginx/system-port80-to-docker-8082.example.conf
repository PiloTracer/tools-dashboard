# =============================================================================
# Host nginx → Docker Tools Dashboard (no :8082 in the browser)
# =============================================================================
#
# You cannot have two programs listen on the same IP:port. You do NOT start a
# second listener on :80. Instead, you add this `server { }` to whatever
# ALREADY owns port 80 on this machine (on POP!_OS / Ubuntu that is usually
# the system `nginx` package).
#
# 1) See what holds :80 (one line):
#      ss -tlnp | grep ':80 '
#    If you see `nginx`, follow step 2. If you see `apache2`, `caddy`, etc.,
#    use that program’s reverse-proxy docs instead—or stop it and use nginx.
#
# 2) Install the `server { ... }` block where nginx loads snippets (check nginx.conf includes).
#    Many installs only read conf.d, so prefer:
#      sudo nano /etc/nginx/conf.d/dev.aiepic.app.conf
#    Or run: infra/nginx/host-setup/02-install-system-nginx-proxy.sh
#
#      sudo nginx -t && sudo systemctl reload nginx
#
# 3) Local DNS: /etc/hosts must contain:
#      127.0.0.1   dev.aiepic.app
#
# 4) Docker stack must publish nginx on 8082 (docker-compose.dev.yml).
#
# 5) Optional: WebSockets (/ws/) need a `map` in http {} (see comment at bottom).
#
# 6) Set PUBLIC_APP_BASE_URL / OAuth redirect to https://dev.aiepic.app/app (no :8082)
#    and restart the compose stack.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name dev.aiepic.app;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

# --- WebSocket upgrade (add ONCE in http {}, e.g. /etc/nginx/nginx.conf inside `http {`):
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
#
# Then inside the `location /` block above, also add:
#
#   proxy_set_header Upgrade $http_upgrade;
#   proxy_set_header Connection $connection_upgrade;
#
# Reload nginx after editing the main config.
