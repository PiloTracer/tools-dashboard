name: change-language
version: 1.0.2
description: Language preference via cookie (i18next); resource route plus global switcher
status: active
owner: Engineering Team

services:
  front-public:
    routes:
      - path: /app/change-language
        file: app/routes/app.change-language.tsx
        description: Re-exports loader/action from the feature module; sets i18next cookie on POST
        authentication_required: false
        methods: [GET, POST]

    feature_module:
      - app/features/change-language/routes/index.tsx

    components:
      - app/components/LanguageSwitcher.tsx

    i18n:
      - app/i18next.server.ts

  shared:
    contracts:
      - shared/contracts/change-language/feature.yaml

configuration:
  notes:
    - Form field name for locale is "lng" (see LanguageSwitcher).
    - Cookie is defined in app/i18next.server.ts (i18next cookie), not the generic env vars listed in older docs.

links:
  planning_docs:
    - .ai/features/change-language/README.md

  implementation_docs:
    - front-public/app/features/change-language/README.md
    - front-public/app/features/change-language/feature.yaml

---

Metadata:
- Last Updated: April 22, 2026
- Maintainer: Engineering Team
- Status: Active
